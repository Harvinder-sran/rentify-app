<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Listing - Rentify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <nav id="main-nav" class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"></nav>
    
    <main class="flex-grow max-w-3xl mx-auto px-4 py-10 w-full">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-8">List an Item</h1>
            
            <form id="new-listing-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input type="text" id="title" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="e.g. Sony A7III Camera">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" rows="4" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Describe the condition, included accessories, etc."></textarea>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="category" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition appearance-none cursor-pointer text-gray-700">
                            <option value="" disabled selected>Select category...</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Tools">Tools</option>
                            <option value="Vehicles">Vehicles</option>
                            <option value="Sports">Sports</option>
                            <option value="Books">Books</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price per day (₹)</label>
                        <input type="number" id="price" required min="0" step="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Images</label>
                    <input type="file" id="images" multiple accept="image/*" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition cursor-pointer">
                    <p class="text-xs text-gray-500 mt-2">You can select multiple images. Max 5MB each.</p>
                </div>
                
                <div id="form-error" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100"></div>
                
                <div class="pt-4 border-t border-gray-100">
                    <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow hover:shadow-lg text-lg">
                        Create Listing
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-8 text-center text-gray-500 text-sm mt-auto">
        <p>&copy; 2026 Rentify. All rights reserved.</p>
    </footer>

    <script type="module">
        import { attachNav } from './js/api.js';
        import { wireNewListing } from './js/new-listing.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            attachNav();
            wireNewListing();
        });
    </script>
</body>
</html>
